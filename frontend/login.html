<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — AutiSENSE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="login-body">

  <div class="login-page">

    <!-- Floating background orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="login-card">

      <!-- Logo -->
      <div class="login-logo">
        <span class="login-logo-icon">🧠</span>
        <h1>Auti<span class="logo-accent">SENSE</span></h1>
      </div>

      <p class="login-tagline">Early autism pre-screening tool</p>

      <div class="login-divider"></div>

      <!-- Login form -->
      <form id="loginForm" class="login-form" novalidate>
        <input type="text" id="loginUser" class="login-input" placeholder="Username" autocomplete="username" />
        <input type="password" id="loginPass" class="login-input" placeholder="Password" autocomplete="current-password" />
        <button type="submit" class="login-btn">Sign In</button>
      </form>

      <!-- Error feedback -->
      <p id="loginError" class="login-error hidden"></p>

      <p class="login-footer">
        By signing in you acknowledge this tool is for
        <strong>educational purposes only</strong> and does not
        provide medical diagnosis.
      </p>

    </div>
  </div>

  <script src="auth.js"></script>
</body>
</html>
